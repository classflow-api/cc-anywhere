<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cc-anywhere · 客户端设计</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #06080d;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #e9edf5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  /* Animations */
  @keyframes cc-pulse {
    0%   { transform: scale(1);   opacity: 0.6; }
    80%  { transform: scale(2.4); opacity: 0;   }
    100% { transform: scale(2.4); opacity: 0;   }
  }
  @keyframes cc-blink {
    50% { opacity: 0; }
  }
  @keyframes cc-orb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(40px, -20px) scale(1.1); }
    66%      { transform: translate(-30px, 30px) scale(0.95); }
  }
  @keyframes cc-drift {
    0%   { background-position: 0 0; }
    100% { background-position: 22px 22px; }
  }
  @keyframes cc-sheen {
    0%   { transform: translateX(-100%); }
    60%, 100% { transform: translateX(400%); }
  }
  @keyframes cc-scan {
    0%   { top: 10px; opacity: 1; }
    50%  { opacity: 1; }
    100% { top: calc(100% - 12px); opacity: 0.6; }
  }
  @keyframes cc-bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50%      { transform: translateY(-5px); opacity: 1; }
  }
  /* Scrollbar subtle */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb {
    background: rgba(120,120,140,0.35); border-radius: 6px;
  }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Make sure flex containers inside artboards don't blow out */
  code { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="tokens.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="mac-client.jsx"></script>
<script type="text/babel" src="mobile-client.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
