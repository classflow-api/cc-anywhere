name: cc_anywhere
description: "cc-anywhere AndroidClient - 跨端 Claude Code 协作客户端"
publish_to: 'none'
version: 0.4.2+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # WebSocket
  web_socket_channel: ^3.0.1

  # Storage
  flutter_secure_storage: ^9.2.2

  # QR scanning
  mobile_scanner: ^5.2.3

  # Image / files / HTTP
  image_picker: ^1.1.2
  dio: ^5.6.0

  # Markdown rendering for assistant text
  flutter_markdown: ^0.7.4
  markdown: ^7.2.2

  # Device info
  device_info_plus: ^10.1.2

  # Utilities
  uuid: ^4.4.2
  collection: ^1.18.0
  crypto: ^3.0.5
  intl: ^0.19.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
